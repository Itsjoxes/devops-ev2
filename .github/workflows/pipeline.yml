name: Build and Deploy to AWS EC2

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    # ========== BUILD IMAGES ==========
    - name: Build Docker images
      run: |
        docker compose build
    
    # ========== DEPLOY BACKEND (Despachos + Ventas + MySQL) ==========
    - name: Deploy backend services to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_BACKEND_HOST }}
        username: ${{ secrets.EC2_BACKEND_USER }}
        key: ${{ secrets.EC2_BACKEND_SSH_KEY }}
        port: 22
        script: |
          cd /home/${{ secrets.EC2_BACKEND_USER }}/proyecto
          
          # Pull latest code
          git pull origin main
          
          # Build and run backend services only
          docker compose down backend-despachos backend-ventas mysql frontend
          docker compose up -d --build backend-despachos backend-ventas mysql
    
    # ========== DEPLOY FRONTEND ==========
    - name: Deploy frontend to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_FRONTEND_HOST }}
        username: ${{ secrets.EC2_FRONTEND_USER }}
        key: ${{ secrets.EC2_FRONTEND_SSH_KEY }}
        port: 22
        script: |
          cd /home/${{ secrets.EC2_FRONTEND_USER }}/proyecto
          
          # Pull latest code
          git pull origin main
          
          # Build and run frontend only
          docker compose down frontend
          docker compose up -d --build frontend
    
    # ========== HEALTH CHECKS ==========
    - name: Health check - Backend
      run: |
        sleep 30
        curl -f http://${{ secrets.EC2_BACKEND_HOST }}:8081/swagger-ui.html || true
        curl -f http://${{ secrets.EC2_BACKEND_HOST }}:8082/swagger-ui.html || true
    
    - name: Health check - Frontend
      run: |
        sleep 10
        curl -f http://${{ secrets.EC2_FRONTEND_HOST }}:8080/ || true
